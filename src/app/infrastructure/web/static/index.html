<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <title>FinBotAction UI</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full p-4 md:p-6 font-sans text-gray-800">
  <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-2">
    <h1 class="text-3xl font-bold">FinBotAction</h1>
    <a href="/docs" class="text-blue-600 hover:underline text-sm md:text-base">
      Swagger / API Docs
    </a>
  </header>

  <section>
    <h2 class="text-xl font-semibold mb-3">Account Records</h2>
    <button onclick="loadRecords()" class="bg-gray-700 text-white px-3 py-1 rounded mb-3 text-sm">
      Refresh
    </button>
    <div class="overflow-x-auto rounded border bg-white shadow-sm">
      <table class="min-w-full divide-y divide-gray-200 text-sm">
        <thead class="bg-gray-100">
          <tr>
            <th class="px-3 py-2 text-left font-semibold">AntragsNr</th>
            <th class="px-3 py-2 text-left font-semibold">KassierDate</th>
            <th class="px-3 py-2 text-left font-semibold">KassierName</th>
            <th class="px-3 py-2 text-left font-semibold">PraesidiumDate</th>
            <th class="px-3 py-2 text-left font-semibold">PraesidiumName</th>
            <th class="px-3 py-2 text-left font-semibold">VereinEmail</th>
          </tr>
        </thead>
        <tbody id="recordsTableBody" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
  </section>

  <script>
    async function loadRecords() {
      const response = await fetch("/account-records");
      const records = await response.json();
      const body = document.getElementById("recordsTableBody");
      body.innerHTML = "";
      records.forEach((record) => {
        const row = document.createElement("tr");
        row.className = "hover:bg-gray-50";
        row.innerHTML = `
          <td class="px-3 py-2">${record.AntragsNr}</td>
          <td class="px-3 py-2">${record.KassierDate}</td>
          <td class="px-3 py-2">${record.KassierName}</td>
          <td class="px-3 py-2">${record.PraesidiumDate}</td>
          <td class="px-3 py-2">${record.PraesidiumName}</td>
          <td class="px-3 py-2">${record.VereinEmail}</td>
        `;
        body.appendChild(row);
      });
    }

    loadRecords();
  </script>
</body>
</html>
